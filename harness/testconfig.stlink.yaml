# STM32CubeProgrammer plan. This backend supports flash/verify/reset and UART,
# but deliberately contains no typed debug action (those require OpenOCD).
version: 1
name: nucleo-f446re-stlink
steps:
  - device: dut
    action: flash
    image_path: build/Debug/nucleo-f446re_demo.elf
    reset_after_flash: true

  - device: dut
    action: uart_open

  - device: dut
    action: uart_close
