# Shared reactor test plan -- run IDENTICALLY on both debugger backends
# (OpenOCD and STM32CubeProgrammer CLI / stlink).
#
# Deterministic behavioral proof: after flashing, a reset-halt debug session
# runs until the breakpoint on `delay` -- reached only once main() has executed
# past the `Hello World` printf into the blink loop. Hitting `delay` proves the
# firmware actually ran on real silicon.
#
# On the stlink backend the debug_* steps currently return `not_supported`
# ("Typed debug sessions require the OpenOCD backend"); the harness scores that
# as PENDING (not a failure) until those functions are implemented for stlink.
# The flash + uart steps must still pass on stlink today.
version: 1
name: nucleo-f446re-boot
steps:
  - device: dut
    action: flash
    image_path: build/Debug/nucleo-f446re_demo.elf
    reset_after_flash: true

  - device: dut
    action: uart_open

  - device: dut
    action: debug_start
    image_path: build/Debug/nucleo-f446re_demo.elf
    mode: reset_halt

  - device: dut
    action: run_until_breakpoint
    location: delay
    timeout_s: 5

  - device: dut
    action: debug_stop

  - device: dut
    action: uart_close
