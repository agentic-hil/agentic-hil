name: Publish npm package

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.1.1
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.14.0"
          registry-url: https://registry.npmjs.org

      - name: Use npm 11.5.1 or newer
        run: npm install -g npm@^11.5.1

      - name: Show publishing toolchain
        run: |
          node --version
          npm --version

      - name: Validate release version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: node scripts/validate-release.mjs "$RELEASE_TAG"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check shrinkwrap alignment
        run: npm run shrinkwrap:check

      - name: Audit production dependencies
        run: npm run audit:prod

      - name: Check package contents
        run: npm run pack:check

      - name: Ensure version is not already published
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "aihil@$VERSION" version >/dev/null 2>&1; then
            echo "aihil@$VERSION is already published. Bump package.json before publishing."
            exit 1
          fi

      - name: Publish with provenance
        run: npm publish --provenance --access public
