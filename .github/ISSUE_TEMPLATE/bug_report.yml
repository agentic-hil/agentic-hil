name: Bug report
description: Report a reproducible Agentic HIL setup, hardware, CLI, MCP, or COM failure.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing Agentic HIL. Please include structured details so the issue can be reproduced safely. For common setup failures, check TROUBLESHOOTING.md first.
  - type: input
    id: version
    attributes:
      label: Agentic HIL version
      description: Run `agentic-hil --version` if available, or provide the PyPI package version / git commit.
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: install_method
    attributes:
      label: Installation method
      options:
        - pip install agentic_hil
        - pipx install agentic_hil
        - uv tool install agentic_hil
        - pip install from git checkout
        - other
    validations:
      required: true
  - type: input
    id: host_os
    attributes:
      label: Host OS
      placeholder: "Windows 11, Ubuntu 24.04, macOS 15"
    validations:
      required: true
  - type: input
    id: python_version
    attributes:
      label: Python and pip versions
      description: Run `python --version` and `pip --version`.
      placeholder: "Python 3.12.x, pip 25.x"
    validations:
      required: true
  - type: input
    id: hardware
    attributes:
      label: Board and debug probe
      placeholder: "STM32 Nucleo-F446RE with onboard ST-Link"
    validations:
      required: true
  - type: input
    id: debugger
    attributes:
      label: Debug backend and version
      placeholder: "OpenOCD 0.12.0, interface/stlink.cfg, target/stm32f4x.cfg"
    validations:
      required: true
  - type: input
    id: com_ports
    attributes:
      label: Serial/COM setup, if relevant
      placeholder: "COM5 at 115200 baud, /dev/ttyACM0, or not used"
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include exact commands and MCP tool calls if applicable.
      placeholder: |
        1. agentic-hil init
        2. agentic-hil doctor
        3. Agent called hardci_probe_target
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include `ok`, `error_type`, `backend_error_type`, `summary`, `likely_causes`, `report_path`, and `log_path` when present.
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Sanitized `.hardci/config.yaml`
      description: Remove local usernames, secrets, private paths, and unrelated COM devices.
      render: yaml
  - type: textarea
    id: report
    attributes:
      label: Last report JSON
      description: Paste sanitized `.hardci/reports/last-report.json` if available.
      render: json
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste only relevant sanitized debugger or COM log excerpts.
      render: text
  - type: checkboxes
    id: safety
    attributes:
      label: Safety checks
      options:
        - label: I did not run raw debugger commands to work around HardCI.
        - label: I did not mass erase the target.
        - label: I stopped after `permission_denied` if it occurred.
        - label: I checked TROUBLESHOOTING.md for this failure mode.
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add screenshots, links, or notes that help explain the issue.
